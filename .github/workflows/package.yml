name: Package Addon

permissions:
  contents: write

on:
  push:
    branches:
      - main
  workflow_dispatch:
  release:
    types:
      - published

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Prepare addon folder
        run: |
          mkdir -p build/TorturedSoulsTTS
          cp TorturedSoulsTTS.lua build/TorturedSoulsTTS/
          cp TorturedSoulsTTS.toc build/TorturedSoulsTTS/
          cp TorturedSoulsTTS.tga build/TorturedSoulsTTS/
          if [ -f README.md ]; then cp README.md build/TorturedSoulsTTS/; fi

      - name: Create zip archive
        run: |
          cd build
          zip -r TorturedSoulsTTS.zip TorturedSoulsTTS

      - name: Upload package artifact
        uses: actions/upload-artifact@v5
        with:
          name: TorturedSoulsTTS
          path: build/TorturedSoulsTTS.zip

      - name: Attach zip to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" build/TorturedSoulsTTS.zip --clobber