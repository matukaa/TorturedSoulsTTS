name: Package Addon

on:
  push:
    branches:
      - main
  workflow_dispatch:
  release:
    types:
      - published

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare addon folder
        run: |
          mkdir -p build/TorturedSoulsTTS
          cp TorturedSoulsTTS.lua build/TorturedSoulsTTS/
          cp TorturedSoulsTTS.toc build/TorturedSoulsTTS/
          cp TorturedSoulsTTS.tga build/TorturedSoulsTTS/
          if [ -f README.md ]; then cp README.md build/TorturedSoulsTTS/; fi

      - name: Create zip archive
        run: |
          cd build
          zip -r TorturedSoulsTTS.zip TorturedSoulsTTS

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: TorturedSoulsTTS
          path: build/TorturedSoulsTTS.zip

      - name: Attach zip to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: build/TorturedSoulsTTS.zip